<!DOCTYPE html>
<html>
<head>
    <title>Placement Record System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .hidden {
            display: none;
        }
        .card-box {
            padding: 20px;
            text-align: center;
            color: white;
            border-radius: 10px;
        }
        .bg-blue { background-color: #0d6efd; }
        .bg-green { background-color: #198754; }
        .bg-orange { background-color: #fd7e14; }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="container mt-5" id="loginPage">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header text-center">
                    <h4>Admin Login</h4>
                </div>
                <div class="card-body">
                    <input type="text" id="username" class="form-control mb-3" placeholder="Username">
                    <input type="password" id="password" class="form-control mb-3" placeholder="Password">
                    <button class="btn btn-primary w-100" onclick="login()">Login</button>
                    <p id="loginError" class="text-danger mt-2"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="container mt-4 hidden" id="dashboardPage">
    <h2 class="text-center mb-4">Placement Dashboard</h2>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card-box bg-blue">
                <h4>Total Students</h4>
                <h3>120</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-box bg-green">
                <h4>Total Companies</h4>
                <h3>25</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-box bg-orange">
                <h4>Total Placements</h4>
                <h3>80</h3>
            </div>
        </div>
    </div>

    <!-- STUDENT FORM -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">Add Student</div>
        <div class="card-body">
            <form onsubmit="return validateStudentForm()">
                <div class="row">
                    <div class="col-md-4">
                        <input type="text" id="studentName" class="form-control mb-3" placeholder="Student Name" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control mb-3" placeholder="Branch" required>
                    </div>
                    <div class="col-md-4">
                        <input type="number" id="cgpa" class="form-control mb-3" placeholder="CGPA (0-10)" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control mb-3" placeholder="Phone" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">Submit</button>
            </form>
        </div>
    </div>

    <!-- COMPANY FORM -->
    <div class="card mb-4">
        <div class="card-header bg-success text-white">Add Company</div>
        <div class="card-body">
            <form>
                <div class="row">
                    <div class="col-md-4">
                        <input type="text" class="form-control mb-3" placeholder="Company Name" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control mb-3" placeholder="Role" required>
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control mb-3" placeholder="Package (LPA)" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>

    <!-- PLACEMENT TABLE -->
    <div class="card">
        <div class="card-header bg-dark text-white">Placement Records</div>
        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead class="table-secondary">
                    <tr>
                        <th>Student Name</th>
                        <th>Company</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Rahul</td>
                        <td>TCS</td>
                        <td class="text-success">Selected</td>
                    </tr>
                    <tr>
                        <td>Amit</td>
                        <td>Infosys</td>
                        <td class="text-danger">Rejected</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    function login() {
        var user = document.getElementById("username").value;
        var pass = document.getElementById("password").value;

        if (user === "admin" && pass === "admin123") {
            document.getElementById("loginPage").classList.add("hidden");
            document.getElementById("dashboardPage").classList.remove("hidden");
        } else {
            document.getElementById("loginError").innerText = "Invalid Username or Password";
        }
    }

    function validateStudentForm() {
        var cgpa = document.getElementById("cgpa").value;

        if (cgpa < 0 || cgpa > 10) {
            alert("CGPA must be between 0 and 10");
            return false;
        }

        alert("Student Added Successfully!");
        return true;
    }
</script>

</body>
</html>
